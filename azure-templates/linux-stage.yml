parameters:
  - name: stageName
    type: string
    default: Linux_Build

  - name: pool
    type: string
    default: DevCentral-VeriStand-CustomDevices

  - name: lvVersionsToBuild
    type: object
    default:
      - version: '2026'
        bitness: '64bit'

  - name: buildSteps
    type: object
    default: []

  - name: releaseVersion
    type: string

  - name: buildOutputLocation
    type: string

  - name: archiveLocation
    type: string

  - name: branch
    type: string
    default: main

  - name: debugBuild
    type: string
    default: no

stages:
  - stage: ${{ parameters.stageName }}
    dependsOn: []

    variables:
      CD.BuildCounter: "9999"

    jobs:
      - job: Job_Build_Linux

        pool:
          name: ${{ parameters.pool }}
          demands:
            - agent.os -equals Linux

        displayName: >
          Linux - Build Verstand CD Projects

        timeoutInMinutes: 120

        steps:

          # ---------------- SMB SETUP ----------------
          - task: Bash@3
            displayName: Mount Nirvana Share
            inputs:
              targetType: inline
              script: |
                set -e

                echo "Installing cifs-utils..."
                if ! command -v mount.cifs &> /dev/null; then
                  sudo apt-get update
                  sudo apt-get install -y cifs-utils
                fi

                sudo mkdir -p /mnt/nirvana

                cat <<EOF > /tmp/smb_creds
                username=nitestsuite
                password=n1testsuite
                domain=amer
                EOF

                sudo chmod 600 /tmp/smb_creds

                echo "Mounting Nirvana share..."
                sudo mount -t cifs //nirvana/Measurements/VeriStandAddons /mnt/nirvana \
                  -o credentials=/tmp/smb_creds,vers=3.0,serverino,noperm

                echo "Verifying mount..."
                mount | grep nirvana || (echo "Mount failed!" && exit 1)

          - ${{ each item in parameters.lvVersionsToBuild }}:
            - ${{ each buildStep in parameters.buildSteps }}:

              - task: Bash@3
                displayName: >
                  Build ${{ buildStep.projectLocation }}
                  (LV ${{ item.version }} ${{ item.bitness }})
                inputs:
                  targetType: inline
                  script: |
                    set -e
                    echo "##vso[task.setvariable variable=buildTimestamp]$(date +%Y%m%d%H%M%S)"

                    projectPath="$(Build.SourcesDirectory)/${{ buildStep.projectLocation }}"
                    echo "Project Path: $projectPath"

                    # ---------------- LabVIEW config ----------------
                    labviewConfig="/home/nitest/natinst/.config/LabVIEW-${{ item.version }}/labview.conf"

                    mkdir -p "$(dirname "$labviewConfig")"
                    touch "$labviewConfig"

                    cat <<'EOF' >> "$labviewConfig"
                    DWarnDialog: False
                    autoerr: 3
                    server.tcp.port: 3363
                    server.tcp.enabled=True
                    server.tcp.access="+*"
                    server.vi.access="+*"
                    NIERAutoSendAndSuppressAllDialogs: True
                    unattended: True
                    EOF

                    # ---------------- Install zip if needed ----------------
                    if ! command -v zip &> /dev/null; then
                      sudo apt-get update
                      sudo apt-get install -y zip
                    fi

                    sleep 30

                    echo "Starting LabVIEW build..."

                    if xvfb-run --auto-servernum LabVIEWCLI \
                      -LabVIEWPath "/usr/local/natinst/LabVIEW-${{ item.version }}-64/labview" \
                      -PortNumber 3363 \
                      -OperationName "${{ buildStep.buildOperation }}" \
                      -ProjectPath "$projectPath" \
                      -TargetName "${{ buildStep.target }}" \
                      -BuildSpecName "${{ buildStep.buildSpec }}"
                    then
                      echo "Build succeeded."

                      projectRoot="$(echo "${{ buildStep.projectLocation }}" | cut -d'/' -f1)"
                      builtFolder="$projectRoot/Built"
                      safeCopy="$(Build.ArtifactStagingDirectory)/BuiltBackup/${{ buildStep.id }}_${{ item.version }}"

                      echo "projectRoot  = $projectRoot"
                      echo "builtFolder = $builtFolder"

                      if [ -d "$builtFolder" ]; then
                        echo "Built folder FOUND. Copying..."

                        mkdir -p "$safeCopy"
                        cp -r "$builtFolder"/* "$safeCopy/" || true

                        echo "Copied to: $safeCopy"
                        ls -l "$safeCopy"
                      else
                        echo "WARNING: Built folder not found!"
                        exit 1
                      fi

                      mkdir -p "$safeCopy"
                      cp -r "$builtFolder"/* "$safeCopy/" || true

                      cd "$safeCopy"

                      zipFileName="${{ buildStep.id }}_${{ item.version }}.zip"

                      echo "Creating zip: $zipFileName"
                      zip -r "$zipFileName" ./*

                      ls -lh "$zipFileName"

                      # ---------------- COPY TO NIRVANA ----------------
                      targetDir="/mnt/nirvana/Linux/$buildTimestamp/$projectRoot"

                      echo "Creating target directory if needed: $targetDir"
                      sudo mkdir -p "$targetDir"

                      echo "Copying zip to Nirvana..."
                      sudo cp "$zipFileName" "$targetDir/"

                      echo "Verifying copy..."
                      ls -lh "$targetDir/" | grep "$zipFileName" || true

                    else
                      echo "Build failed."
                      exit 1
                    fi

          # ---------------- CLEANUP ----------------
          - task: Bash@3
            displayName: Unmount Nirvana Share
            condition: always()
            inputs:
              targetType: inline
              script: |
                echo "Unmounting Nirvana share..."
                sudo umount /mnt/nirvana || true
                rm -f /tmp/smb_creds